{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - VehiTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/inscription.css' %}">
</head>
<body>
<div class="inscription-container">
    <div class="inscription-card">
        <div class="logo"><i class="fas fa-folder-tree"></i><h2>VehiTrack</h2></div>
        <h1>Connexion</h1>
        <form method="post" class="inscription-form">
            {% csrf_token %}
            <div class="form-group"><label><i class="fas fa-user"></i> Nom d'utilisateur</label>{{ form.username }}</div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Mot de passe</label>{{ form.password }}</div>
            <button type="submit" class="btn-inscription">Se connecter</button>
        </form>
        <div class="login-link">Pas de compte ? <a href="{% url 'inscription' %}">Inscrivez-vous</a></div>
    </div>
</div>
</body>
</html>
